<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="말차몰 — 상품 상세">
  <title>상품 상세 | 말차몰</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Noto+Sans+KR:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="header">
    <nav class="nav container">
      <a href="index.html" class="logo">
        <span class="logo-icon" aria-hidden="true">🍵</span>
        말차몰
      </a>
      <ul class="nav-links">
        <li><a href="index.html#best">베스트</a></li>
        <li><a href="index.html#products">상품</a></li>
      </ul>
      <button type="button" class="cart-btn" id="cart-toggle" aria-label="장바구니 열기">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <path d="M16 10a4 4 0 0 1-8 0" />
        </svg>
        <span class="cart-count" id="cart-count">0</span>
      </button>
    </nav>
  </header>

  <main class="product-detail-page">
    <div class="container">
      <a href="index.html#products" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6" />
        </svg>
        상품 목록으로
      </a>
      <article class="product-detail" id="product-detail">
        <!-- JS로 렌더 -->
      </article>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <p class="footer-brand">말차몰</p>
      <p class="footer-copy">Developed by Lake Kim | GitHub: lakekimhandsome</p>
    </div>
  </footer>

  <div class="cart-overlay" id="cart-overlay" aria-hidden="true"></div>
  <aside class="cart-panel" id="cart-panel" aria-label="장바구니">
    <div class="cart-header">
      <h2 class="cart-title">장바구니</h2>
      <button type="button" class="cart-close" id="cart-close" aria-label="장바구니 닫기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <div class="cart-body" id="cart-items">
      <p class="cart-empty">장바구니가 비어 있습니다.</p>
    </div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>합계</span>
        <strong id="cart-total">₩0</strong>
      </div>
      <button type="button" class="btn btn-primary btn-block" id="cart-checkout" disabled>주문하기</button>
    </div>
  </aside>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/product.js"></script>
</body>

</html>
